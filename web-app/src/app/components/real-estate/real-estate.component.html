<div>
  <div class="md:m-2">
    <a routerLink="/">
      <button
        type="button"
        class="my-2 mx-2 text-white font-medium rounded-lg text-sm px-5 py-2.5 text-center me-2 mb-2 border hover:text-white border-[cornflowerblue] hover:bg-gray-700 focus:ring-4 focus:outline-none focus:ring-white-300 dark:border-[cornflowerblue] dark:text-white dark:hover:text-white dark:hover:bg-gray-700 dark:focus:ring-white-800"
      >
        Home
      </button>
    </a>
    <a routerLink="/tool-menu">
      <button
        type="button"
        class="my-2 mx-2 text-white font-medium rounded-lg text-sm px-5 py-2.5 text-center me-2 mb-2 border hover:text-white border-[cornflowerblue] hover:bg-gray-700 focus:ring-4 focus:outline-none focus:ring-white-300 dark:border-[cornflowerblue] dark:text-white dark:hover:text-white dark:hover:bg-gray-700 dark:focus:ring-white-800"
      >
        Tool Menu
      </button>
    </a>
  </div>
  <div class="flexbox text-white">
    <h1 class="text-2xl text-center font-bold my-4">Sales Analyzer</h1>
    <h2 class="text-xl text-center my-4">Submit the form to see sample text</h2>
    <div class="mx-auto max-w-md">
      <div class="text-justify">
        <form
          class="border border-green-300 m-2 p-2 text-white dark:text-white"
        >
          <div>
            <div class="flex justify-between">
              <label for="name">Name: </label>
              <input
                id="name"
                type="text"
                class="m-2 border border-green-300 bg-white max-w-md text-black focus:ring-4 focus:outline-none focus:ring-white-300 hover:text-white border-[cornflowerblue] hover:bg-gray-700"
                [formControl]="this.getRealEstateFormNameControl()"
              />
            </div>
            <div class="flex justify-between">
              <label for="city">City: </label>
              <input
                id="city"
                type="text"
                class="m-2 border border-green-300 bg-white max-w-md text-black focus:ring-4 focus:outline-none focus:ring-white-300 hover:text-white border-[cornflowerblue] hover:bg-gray-700"
                [formControl]="this.getRealEstateFormCityControl()"
              />
            </div>
            <div class="flex justify-between">
              <label for="name">State: </label>
              <input
                id="name"
                type="text"
                class="m-2 border border-green-300 bg-white max-w-md text-black focus:ring-4 focus:outline-none focus:ring-white-300 hover:text-white border-[cornflowerblue] hover:bg-gray-700"
                [formControl]="this.getRealEstateFormStateControl()"
              />
            </div>
            <div class="flex justify-between">
              <label for="city">Zip Code: </label>
              <input
                id="city"
                type="text"
                class="m-2 border border-green-300 bg-white max-w-md text-black focus:ring-4 focus:outline-none focus:ring-white-300 hover:text-white border-[cornflowerblue] hover:bg-gray-700"
                [formControl]="this.getRealEstateFormZipCodeControl()"
              />
            </div>
            <div class="flex justify-between">
              <label for="name">Address:* </label>
              <input
                id="name"
                type="text"
                class="m-2 border border-green-300 bg-white max-w-md text-black focus:ring-4 focus:outline-none focus:ring-white-300 hover:text-white border-[cornflowerblue] hover:bg-gray-700"
                [formControl]="this.getRealEstateFormAddressControl()"
              />
            </div>
            <div>(* is optional)</div>
          </div>

          <div class="text-center">
            <button
              id="submit"
              type="button"
              class="font-medium rounded-lg text-sm px-5 py-2.5 text-center border border-green-300 focus:ring-4 focus:outline-none focus:ring-white-300 hover:text-white border-[cornflowerblue] hover:bg-gray-700"
            >
              Submit
            </button>
          </div>
        </form>
      </div>
      @if (isShown()) {
        <div
          class="loading-container flex justify-center text-white dark:text-white"
          animate.enter="enter-animation"
        >
          <p>
            Analyzing the sales of
            {{ this.getRealEstateFormNameControlValue() }} in
            {{ this.getRealEstateFormCityControlValue() }}...
          </p>
          <div class="spinner-container">
            <img
              class="spinner"
              src="assets/cheesecake-with-slice.png"
              alt="cheesewheel spinning"
            />
          </div>
        </div>
      }
      @if (!isShown()) {
        <analysis [responseText]="response()"></analysis>
      }
    </div>
  </div>
</div>
